<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>区域检测测试</title>
  <style>
    :root {
      --bg: #11110f;
      --panel: #1c1b18;
      --panel-2: #26241f;
      --line: #3a362d;
      --text: #f4f0e8;
      --muted: #a9a195;
      --accent: #37c8a5;
      --blue: #4aa3ff;
      --red: #ff665a;
      --warn: #e7b84f;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      background:
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px) 0 0 / 48px 48px,
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px) 0 0 / 48px 48px,
        var(--bg);
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(17, 17, 15, 0.92);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 34px;
      height: 34px;
      border: 1px solid var(--accent);
      border-radius: 4px;
      display: grid;
      place-items: center;
      color: var(--accent);
      font-weight: 800;
      box-shadow: inset 0 0 18px rgba(55, 200, 165, 0.16);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }

    .sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: var(--panel-2);
      padding: 0 12px;
      cursor: pointer;
      transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
    }

    .button:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .button.primary {
      border-color: rgba(55, 200, 165, 0.65);
      background: #17372f;
      color: #dffdf5;
    }

    .button:disabled {
      cursor: not-allowed;
      color: #676158;
      border-color: #2f2b25;
      background: #191815;
      transform: none;
    }

    .file-input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .main {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 0;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: rgba(28, 27, 24, 0.86);
      padding: 14px;
      overflow: auto;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .metric {
      min-height: 72px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      padding: 10px;
    }

    .metric b {
      display: block;
      font-size: 22px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .metric span,
    .status,
    .row small {
      color: var(--muted);
      font-size: 12px;
    }

    .progress {
      height: 8px;
      border-radius: 999px;
      background: #29261f;
      overflow: hidden;
      border: 1px solid var(--line);
      margin: 12px 0;
    }

    .progress > div {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--blue));
      transition: width 0.2s ease;
    }

    .queue {
      display: grid;
      gap: 6px;
      margin-top: 14px;
    }

    .row {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: rgba(17, 17, 15, 0.45);
      cursor: pointer;
    }

    .row.active {
      border-color: var(--accent);
      background: rgba(55, 200, 165, 0.09);
    }

    .row strong {
      display: block;
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .workspace {
      min-width: 0;
      overflow: auto;
      padding: 18px;
    }

    .viewer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 14px;
      align-items: start;
      margin-bottom: 18px;
    }

    .stage,
    .detail,
    .tile {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(28, 27, 24, 0.88);
      box-shadow: var(--shadow);
    }

    .stage {
      min-height: 420px;
      display: grid;
      place-items: center;
      padding: 12px;
      overflow: hidden;
    }

    .stage canvas {
      max-width: 100%;
      max-height: 72vh;
      width: auto;
      height: auto;
      background: #070706;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 28px;
    }

    .detail {
      padding: 12px;
    }

    .detail h2 {
      margin: 0 0 12px;
      font-size: 14px;
    }

    .prediction-list {
      display: grid;
      gap: 8px;
    }

    .pred {
      border-left: 4px solid var(--accent);
      background: #151411;
      padding: 8px;
      border-radius: 4px;
    }

    .pred:nth-child(2) {
      border-color: var(--blue);
    }

    .pred:nth-child(3) {
      border-color: var(--red);
    }

    .pred b {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .pred code {
      color: var(--muted);
      font-size: 11px;
      word-break: break-all;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .tile {
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.18s ease, transform 0.18s ease;
    }

    .tile:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .tile canvas {
      width: 100%;
      aspect-ratio: 16 / 10;
      display: block;
      background: #070706;
    }

    .tile footer {
      display: grid;
      gap: 4px;
      padding: 8px;
    }

    .tile strong {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ok {
      color: var(--accent);
    }

    .bad {
      color: var(--warn);
    }

    @media (max-width: 980px) {
      .topbar,
      .main,
      .viewer {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        max-height: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark">R3</div>
        <div>
          <h1>耐张线夹区域检测</h1>
          <div class="sub" id="serverStatus">连接本机推理服务中</div>
        </div>
      </div>
      <div class="actions">
        <input class="file-input" id="folderInput" type="file" webkitdirectory directory multiple accept="image/png,image/jpeg,image/jpg">
        <button class="button" id="pickBtn" type="button">选择文件夹</button>
        <button class="button primary" id="runBtn" type="button" disabled>开始检测</button>
        <button class="button" id="clearBtn" type="button" disabled>清空</button>
      </div>
    </header>

    <main class="main">
      <aside class="sidebar">
        <section class="metrics">
          <div class="metric"><b id="fileCount">0</b><span>图片</span></div>
          <div class="metric"><b id="doneCount">0</b><span>完成</span></div>
          <div class="metric"><b id="boxCount">0</b><span>区域框</span></div>
          <div class="metric"><b id="issueCount">0</b><span>异常</span></div>
        </section>
        <div class="status" id="statusText">等待选择</div>
        <div class="progress"><div id="progressBar"></div></div>
        <section class="queue" id="queue"></section>
      </aside>

      <section class="workspace">
        <div class="viewer">
          <div class="stage" id="stage">
            <div class="empty">未加载图片</div>
          </div>
          <aside class="detail">
            <h2 id="detailTitle">预测结果</h2>
            <div class="prediction-list" id="predictionList"></div>
          </aside>
        </div>
        <section class="grid" id="resultGrid"></section>
      </section>
    </main>
  </div>

  <script>
    const COLORS = {
      1: "#37c8a5",
      2: "#4aa3ff",
      3: "#ff665a"
    };

    const state = {
      files: [],
      results: new Map(),
      urls: new Map(),
      active: null,
      running: false
    };

    const els = {
      folderInput: document.getElementById("folderInput"),
      pickBtn: document.getElementById("pickBtn"),
      runBtn: document.getElementById("runBtn"),
      clearBtn: document.getElementById("clearBtn"),
      serverStatus: document.getElementById("serverStatus"),
      fileCount: document.getElementById("fileCount"),
      doneCount: document.getElementById("doneCount"),
      boxCount: document.getElementById("boxCount"),
      issueCount: document.getElementById("issueCount"),
      statusText: document.getElementById("statusText"),
      progressBar: document.getElementById("progressBar"),
      queue: document.getElementById("queue"),
      stage: document.getElementById("stage"),
      resultGrid: document.getElementById("resultGrid"),
      detailTitle: document.getElementById("detailTitle"),
      predictionList: document.getElementById("predictionList")
    };

    function isImage(file) {
      return /\.(png|jpe?g)$/i.test(file.name);
    }

    function displayName(file) {
      return file.webkitRelativePath || file.name;
    }

    function setStatus(text) {
      els.statusText.textContent = text;
    }

    function updateMetrics() {
      const results = [...state.results.values()];
      const boxes = results.reduce((sum, item) => sum + item.predictions.length, 0);
      const issues = results.reduce((sum, item) => sum + (item.ok ? 0 : 1), 0);
      els.fileCount.textContent = state.files.length;
      els.doneCount.textContent = results.length;
      els.boxCount.textContent = boxes;
      els.issueCount.textContent = issues;
      els.progressBar.style.width = state.files.length ? `${(results.length / state.files.length) * 100}%` : "0";
      els.runBtn.disabled = state.running || state.files.length === 0;
      els.clearBtn.disabled = state.running || (state.files.length === 0 && results.length === 0);
    }

    function renderQueue() {
      els.queue.innerHTML = "";
      state.files.forEach((file, index) => {
        const row = document.createElement("button");
        row.className = `row${state.active === index ? " active" : ""}`;
        row.type = "button";
        const result = state.results.get(index);
        row.innerHTML = `
          <strong>${displayName(file)}</strong>
          <small>${result ? (result.ok ? "完成 / 3 区域" : "需复核") : "待检测"}</small>
        `;
        row.addEventListener("click", () => showImage(index));
        els.queue.appendChild(row);
      });
    }

    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function loadImage(url) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = url;
      });
    }

    function drawPredictions(canvas, image, result, fit = false) {
      const ctx = canvas.getContext("2d");
      const scale = fit ? Math.min(360 / image.width, 225 / image.height, 1) : 1;
      canvas.width = Math.max(1, Math.round(image.width * scale));
      canvas.height = Math.max(1, Math.round(image.height * scale));
      ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
      ctx.lineWidth = Math.max(2, Math.round(5 * scale));
      ctx.font = `${Math.max(12, Math.round(24 * scale))}px "Microsoft YaHei UI", sans-serif`;
      ctx.textBaseline = "top";

      result.predictions.forEach((pred) => {
        const color = COLORS[pred.label_id] || "#e7b84f";
        const x = pred.x_min * scale;
        const y = pred.y_min * scale;
        const w = (pred.x_max - pred.x_min) * scale;
        const h = (pred.y_max - pred.y_min) * scale;
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.strokeRect(x, y, w, h);
        const text = `${pred.label_name} ${Number(pred.score).toFixed(2)}`;
        const metrics = ctx.measureText(text);
        ctx.fillStyle = "rgba(17, 17, 15, 0.82)";
        ctx.fillRect(x, y, metrics.width + 12, Math.max(20, 28 * scale));
        ctx.fillStyle = color;
        ctx.fillText(text, x + 6, y + 4);
      });
    }

    async function showImage(index) {
      state.active = index;
      renderQueue();
      const file = state.files[index];
      const url = state.urls.get(index) || URL.createObjectURL(file);
      state.urls.set(index, url);
      const image = await loadImage(url);
      const result = state.results.get(index) || {
        name: displayName(file),
        predictions: [],
        ok: false,
        missing: ["区域1", "区域2", "区域3"]
      };

      els.stage.innerHTML = "";
      const canvas = document.createElement("canvas");
      drawPredictions(canvas, image, result, false);
      els.stage.appendChild(canvas);

      els.detailTitle.textContent = displayName(file);
      els.predictionList.innerHTML = "";
      if (!result.predictions.length) {
        els.predictionList.innerHTML = `<div class="status">暂无预测</div>`;
      } else {
        result.predictions.forEach((pred) => {
          const item = document.createElement("div");
          item.className = "pred";
          item.innerHTML = `
            <b><span>${pred.label_name}</span><span>${Number(pred.score).toFixed(3)}</span></b>
            <code>${pred.x_min}, ${pred.y_min}, ${pred.x_max}, ${pred.y_max}</code>
          `;
          els.predictionList.appendChild(item);
        });
      }
    }

    async function renderTile(index) {
      const result = state.results.get(index);
      const file = state.files[index];
      const url = state.urls.get(index) || URL.createObjectURL(file);
      state.urls.set(index, url);
      const image = await loadImage(url);

      let tile = document.querySelector(`[data-tile="${index}"]`);
      if (!tile) {
        tile = document.createElement("article");
        tile.className = "tile";
        tile.dataset.tile = index;
        tile.innerHTML = `<canvas></canvas><footer><strong></strong><small></small></footer>`;
        tile.addEventListener("click", () => showImage(index));
        els.resultGrid.appendChild(tile);
      }
      drawPredictions(tile.querySelector("canvas"), image, result, true);
      tile.querySelector("strong").textContent = displayName(file);
      tile.querySelector("small").innerHTML = result.ok
        ? `<span class="ok">3 个区域</span>`
        : `<span class="bad">缺失 ${result.missing.join(", ")}</span>`;
    }

    async function predictBatch(batch) {
      const images = await Promise.all(batch.map(async ({ file, index }) => ({
        index,
        name: displayName(file),
        data: await fileToDataURL(file)
      })));
      const response = await fetch("/api/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ images })
      });
      const payload = await response.json();
      if (!payload.ok) {
        throw new Error(payload.error || "推理失败");
      }
      payload.results.forEach((result, offset) => {
        state.results.set(images[offset].index, result);
      });
    }

    async function runPredictions() {
      if (!state.files.length || state.running) return;
      state.running = true;
      updateMetrics();
      setStatus("检测中");
      els.resultGrid.innerHTML = "";
      state.results.clear();

      const batchSize = 4;
      try {
        for (let start = 0; start < state.files.length; start += batchSize) {
          const batch = state.files.slice(start, start + batchSize).map((file, offset) => ({
            file,
            index: start + offset
          }));
          await predictBatch(batch);
          for (const item of batch) {
            await renderTile(item.index);
          }
          if (state.active === null && state.results.has(0)) {
            await showImage(0);
          }
          updateMetrics();
          renderQueue();
        }
        setStatus("检测完成");
      } catch (error) {
        setStatus(error.message);
      } finally {
        state.running = false;
        updateMetrics();
      }
    }

    function clearAll() {
      state.urls.forEach((url) => URL.revokeObjectURL(url));
      state.files = [];
      state.results.clear();
      state.urls.clear();
      state.active = null;
      els.folderInput.value = "";
      els.resultGrid.innerHTML = "";
      els.stage.innerHTML = `<div class="empty">未加载图片</div>`;
      els.predictionList.innerHTML = "";
      els.detailTitle.textContent = "预测结果";
      setStatus("等待选择");
      renderQueue();
      updateMetrics();
    }

    async function checkServer() {
      try {
        const response = await fetch("/api/health");
        const payload = await response.json();
        els.serverStatus.textContent = `${payload.device} / ${payload.selection} / ${payload.weights}`;
      } catch {
        els.serverStatus.textContent = "本机推理服务未连接";
      }
    }

    els.pickBtn.addEventListener("click", () => els.folderInput.click());
    els.runBtn.addEventListener("click", runPredictions);
    els.clearBtn.addEventListener("click", clearAll);
    els.folderInput.addEventListener("change", () => {
      const selectedFiles = [...els.folderInput.files].filter(isImage)
        .sort((a, b) => displayName(a).localeCompare(displayName(b), "zh-CN"));
      clearAll();
      state.files = selectedFiles;
      if (state.files.length) {
        state.active = 0;
        setStatus("已选择");
        showImage(0);
      }
      renderQueue();
      updateMetrics();
    });

    checkServer();
    updateMetrics();
  </script>
</body>
</html>
